name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What is currently missing or painful?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI command
        - Container backend (Incus/LXC)
        - Extensions (GApps, Magisk, etc.)
        - Images
        - Streaming (wdt stream)
        - Storage (wdt storage)
        - Terraform
        - GitHub Action
        - Documentation
        - Other
