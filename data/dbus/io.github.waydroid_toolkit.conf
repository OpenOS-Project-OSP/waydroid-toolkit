<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow any user to own the bus name (session bus only) -->
  <policy context="default">
    <allow own="io.github.waydroid_toolkit"/>
    <allow send_destination="io.github.waydroid_toolkit"/>
    <allow receive_sender="io.github.waydroid_toolkit"/>
  </policy>
</busconfig>
