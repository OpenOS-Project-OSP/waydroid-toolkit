app-id: io.github.waydroid_toolkit.WaydroidToolkit
runtime: org.kde.Platform
runtime-version: '6.6'
sdk: org.kde.Sdk
command: waydroid-toolkit

finish-args:
  # Wayland and X11 display access
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Network access for OTA updates and extension downloads
  - --share=network
  # Host filesystem access for image profiles and file transfer
  - --filesystem=home
  - --filesystem=/var/lib/waydroid:rw
  # D-Bus access for Waydroid session management
  - --system-talk-name=id.waydro.Container
  - --talk-name=id.waydro.Session

modules:
  # Python runtime dependencies (wheels — no network access at build time)
  - name: python3-click
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-index click-8.1.7-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/py3/c/click/click-8.1.7-py3-none-any.whl
        sha256: ae74fb96c20a0277a1d615f1e4d73c8414f5a98db8b799a7931d1582f3390c28

  - name: python3-rich
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-index rich-13.7.1-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/py3/r/rich/rich-13.7.1-py3-none-any.whl
        sha256: 4edbae314f59eb482f54e9e30bf00d33350aaa94f4bfcd4e9e3110e64d0d7222

  - name: python3-requests
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-index requests-2.31.0-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/py3/r/requests/requests-2.31.0-py3-none-any.whl
        sha256: 58cd2187c01e70e6e26505bca751777aa9f2ee0b7f4300988b709f44e013003f

  - name: python3-toml
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps --no-index toml-0.10.2-py2.py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/py2.py3/t/toml/toml-0.10.2-py2.py3-none-any.whl
        sha256: 806143ae5bfb6a3c6e736a764057db0e6a0e05e338b5630894a5f779cabb4f9b

  - name: waydroid-toolkit
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app --no-deps .
      - install -d /app/share/waydroid-toolkit
      - cp -r src/waydroid_toolkit/gui/qml /app/share/waydroid-toolkit/
    sources:
      - type: dir
        path: ../..
